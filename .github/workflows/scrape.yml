name: Daily DeepLeak Scraper

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Pipeline Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python processor.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "DeepLeak-Bot"
        git config --global user.email "bot@deepleak.intel"
        git add data/articles.json
        git diff-index --quiet HEAD || git commit -m "Auto-update: daily strategic intel data"
        git push
